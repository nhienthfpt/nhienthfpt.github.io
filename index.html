<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <style>
        /* ===== Base ===== */
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            background: #0e0e11;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }

        /* ===== Chữ chính ===== */
        #t {
            position: absolute;
            color: #fff;
            font-size: 64px;
            font-weight: 600;
            letter-spacing: 2px;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* ===== Tim bay ===== */
        .h {
            position: absolute;
            color: #ff4d6d;
            font-size: 18px;
            pointer-events: none;
            animation: hf 1s ease-out forwards;
        }

        @keyframes hf {
            from {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }

            to {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(.2)
            }
        }

        /* ===== Pháo hoa ===== */
        .s {
            position: absolute;
            border-radius: 50%;
            background: hsl(var(--h), 100%, 60%);
            pointer-events: none;
            animation: fw 1.2s ease-out forwards;
        }

        @keyframes fw {
            from {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }

            to {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(0)
            }
        }

        /* ===== Tester links ===== */
        .tester-box {
            position: fixed;
            top: 16px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .tester {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 77, 109, .9);
            padding: 6px 14px;
            border-radius: 20px;
            transition: .2s;
            text-align: center;
        }

        .tester:hover {
            background: #ff4d6d;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- ===== Link Tester ===== -->
    <div class="tester-box">
        <a class="tester" href="https://github.com/nhienthfpt/GAM203SuperMario" target="_blank">
            🎮 SuperMario
        </a>
        <a class="tester" href="https://github.com/nhienthfpt/GAM203PixelAdventure" target="_blank">
            🕹️ PixelAdventure
        </a>
    </div>

    <!-- ===== Text ===== -->
    <div id="t">过客</div>

    <script>
        (() => {
            document.addEventListener("contextmenu", e => e.preventDefault());

            const t = document.getElementById("t");
            let mx = innerWidth / 2, my = innerHeight / 2, x = mx, y = my;

            document.addEventListener("mousemove", e => {
                mx = e.clientX; my = e.clientY;
                heart(mx, my);
            });

            document.addEventListener("click", e => {
                firework(e.clientX, e.clientY);
            });

            function loop() {
                x += (mx - x) * .08;
                y += (my - y) * .08;
                t.style.left = x + "px";
                t.style.top = y + "px";
                requestAnimationFrame(loop);
            }
            loop();

            function heart(x, y) {
                const d = document.createElement("div");
                d.className = "h";
                d.textContent = "❤";
                d.style.left = x + "px";
                d.style.top = y + "px";
                const a = Math.random() * Math.PI * 2, r = 30 + Math.random() * 40;
                d.style.setProperty("--x", Math.cos(a) * r + "px");
                d.style.setProperty("--y", Math.sin(a) * r + "px");
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 1000);
            }

            function firework(x, y) {
                for (let i = 0; i < 70; i++) {
                    const s = document.createElement("div");
                    s.className = "s";
                    s.style.left = x + "px";
                    s.style.top = y + "px";
                    s.style.width = "8px";
                    s.style.height = "8px";
                    const a = Math.random() * Math.PI * 2, r = 140 + Math.random() * 140;
                    s.style.setProperty("--x", Math.cos(a) * r + "px");
                    s.style.setProperty("--y", Math.sin(a) * r + "px");
                    s.style.setProperty("--h", Math.random() * 360);
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 1200);
                }
            }
        })();
    </script>

</body>

</html>
